<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智慧調度系統 — OR 最佳化排程</title>
<style>
:root{--bg:#d9d9d9;--khaki:#e7dd8f;--khaki2:#efe7a4;--chip:#f4ca00;--orange:#f4a62a;--red:#ff1f1f;--text:#202020;--green:#2b9d51;--soft:#efefef;--soft2:#f4f4f4;--or:#2563eb;--orbg:#e8f0fe}
*{box-sizing:border-box}
body{margin:0;font-family:"Microsoft JhengHei","PingFang TC",Arial,sans-serif;background:var(--bg);color:var(--text)}
.topline{height:8px;background:linear-gradient(90deg,#e1d300 60%,var(--or))}
.wrap{max-width:1600px;margin:0 auto;padding:12px 16px 28px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
.pin{font-size:26px;width:40px;text-align:center}
.sel,.btn{border:none;border-radius:18px;padding:11px 13px;background:var(--khaki);font-size:14px;font-weight:700;outline:none}
.sel{min-width:120px}.btn{cursor:pointer;min-width:130px}
.btn:hover{background:#dfd279}
.btn-or{background:var(--or);color:#fff;font-size:15px;padding:12px 18px}
.btn-or:hover{background:#1d4ed8}
.summ{font-size:15px;color:#7a5800;margin:6px 0 10px 44px;display:flex;flex-wrap:wrap;gap:5px 16px}
.summ b{color:#202020;font-size:16px}
.grid2{margin-left:44px;display:grid;grid-template-columns:1.65fr 1fr;gap:16px}
.pnl{border:1px solid #c9c9c9;background:#dcdcdc;border-radius:4px}
.pnl-t{background:var(--khaki);padding:10px 14px;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.pnl-t .m{font-size:12px;color:#5a4500;font-weight:600}
.pnl-t.ort{background:linear-gradient(90deg,var(--khaki),var(--orbg))}
.pnl-b{padding:12px;max-height:1400px;overflow:auto}
.orb{background:var(--orbg);border:2px solid var(--or);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:8px 20px;align-items:center}
.orb .oi{font-size:28px}.orb .os{display:flex;flex-direction:column;align-items:center}
.orb .ov{font-size:24px;font-weight:900;color:var(--or)}.orb .ol{font-size:10px;color:#555;font-weight:700}
.orb .ovs{font-size:11px;color:#666;font-weight:700;padding:4px 8px;background:#fff;border-radius:8px;max-width:240px}
.tc{background:var(--soft);border-radius:14px;padding:12px 14px 10px;margin-bottom:12px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
.th{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:4px}
.ttype{display:inline-block;color:#fff;font-size:12px;font-weight:800;border-radius:14px;padding:3px 10px}
.ttype.in{background:#ef3d2f}.ttype.out{background:#ff9800}
.sq{display:inline-block;background:var(--or);color:#fff;font-size:11px;font-weight:900;border-radius:50%;width:24px;height:24px;text-align:center;line-height:24px;margin-right:4px}
.pr{color:#b07000;font-size:12px;font-weight:800}
.ttl{font-size:15px;font-weight:900;margin:3px 0 5px}
/* 銜接行車 */
.link-bar{background:#f0e6ff;border:1px dashed #a78bda;border-radius:8px;padding:6px 10px;margin:6px 0;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#6b46a8}
.link-bar .link-icon{font-size:18px}
.link-bar b{color:#202020}
.tb{background:#fff;border-radius:10px;padding:9px 10px;margin-top:6px;border:1px solid #e0d29c}
.tbh{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:12px;color:#7a5800;margin-bottom:4px;padding-bottom:4px;border-bottom:1px dashed #d6c87c}
.tbt{background:var(--chip);color:#202020;padding:2px 8px;border-radius:12px;font-weight:800;font-size:12px}
.sf{margin:5px 0 6px}.sr{display:flex;align-items:flex-start}
.sn{display:flex;flex-direction:column;align-items:center;min-width:85px;max-width:170px;flex:1}
.sl{background:#fff8d3;border:1px solid #ead87a;border-radius:7px;padding:3px 6px;font-size:11px;font-weight:800;text-align:center;width:100%;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sd{font-size:10px;color:#5a4500;font-weight:700;line-height:1.4;text-align:center}
.sd .sp{display:block;border-top:1px dashed #d6c87c;margin:1px 0}.sd b{color:#202020}
.sa{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:58px;padding:0 2px}
.sa .aline{width:100%;height:2px;background:#b07000;position:relative}
.sa .aline::after{content:'▶';position:absolute;right:-6px;top:-8px;color:#b07000;font-size:11px}
.sa .ai{font-size:9px;color:#888;font-weight:700;text-align:center;margin-top:1px;line-height:1.2}
.tg{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:5px;font-size:11px}
.cx{background:#f7f3da;border:1px solid #e0d29c;border-radius:6px;padding:3px 4px;display:flex;flex-direction:column;align-items:center}
.cx .cl{color:#7a5800;font-weight:700;font-size:9px}.cx .cv{color:#202020;font-weight:900;font-size:13px;margin-top:1px}
.cx.cs{background:#e8e0f0;border-color:#c5b8d8}.cx.cs .cl{color:#5c4a8a}
.cx.ct{background:#eaf5ea;border-color:#bfdcbf}.cx.ct .cl{color:#2b6a3d}
.cx.cw{background:#fde8d2;border-color:#f0c896}.cx.cw .cl{color:#a05500}
.cx.ctot{background:var(--chip);border-color:#d4ad00}.cx.ctot .cl{color:#5a4500}
.ts{margin-top:6px;padding:6px 9px;background:var(--khaki2);border-radius:8px;font-size:11px;font-weight:700;color:#5a4500;display:flex;flex-wrap:wrap;gap:3px 10px}
.ts b{color:#202020;font-size:13px}
.pgw{height:14px;background:#e8e8e8;border-radius:7px;overflow:hidden;margin-top:4px;position:relative}
.pgb{height:100%;border-radius:7px}.pgb.pg{background:linear-gradient(90deg,#34d399,#2b9d51)}.pgb.py{background:linear-gradient(90deg,#fbbf24,#f4a62a)}.pgb.pr2{background:linear-gradient(90deg,#f87171,#ef3d2f)}
.pgl{position:absolute;right:6px;top:0;font-size:9px;font-weight:800;color:#333;line-height:14px}
.ec{background:var(--soft);border-radius:14px;padding:20px;text-align:center;color:#666;font-size:14px;font-weight:700}
.al2{list-style:none;margin:0;padding:0}
.ai2{background:var(--soft);border-radius:10px;padding:6px 8px;margin-bottom:5px;display:grid;grid-template-columns:28px 1fr 55px 50px;gap:4px;align-items:center}
.ark{background:var(--chip);color:#202020;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px}
.an{font-weight:800;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.am{font-size:9px;color:#666;margin-top:1px}
.at2{background:#202020;color:#fff;padding:3px 5px;border-radius:8px;font-weight:800;font-size:11px;text-align:center}
.ae2{background:#e0f7e0;color:#1a6e2e;padding:3px 5px;border-radius:8px;font-weight:800;font-size:10px;text-align:center}
.u{font-size:8px;opacity:.8;margin-left:1px}
.lb{background:var(--soft2);border-radius:9px;padding:8px 10px;font-size:10px;color:#5a4500;margin-bottom:10px;line-height:1.7}
.lb b{color:#202020}
.lb .f{display:inline-block;background:#fff;padding:1px 4px;border:1px dashed #d6c87c;border-radius:4px;font-family:Consolas,Monaco,monospace;margin:0 2px;font-size:9px}
.cn{text-align:center;color:#b07000;font-size:14px;font-weight:800;margin:12px 0}
.sg{display:grid;grid-template-columns:repeat(2,minmax(120px,1fr));gap:6px;margin-bottom:8px}
.fd label{display:block;font-weight:700;margin-bottom:2px;font-size:10px;color:#5a4500}
.fd input,.fd select{width:100%;padding:7px 8px;border:none;border-radius:8px;background:#f2f2f2;font-size:13px;outline:none;font-weight:600}
@media(max-width:1200px){.grid2{grid-template-columns:1fr}}
@media(max-width:760px){.summ,.grid2{margin-left:0}.pin{display:none}.tg{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="topline"></div>
<div class="wrap">
  <div class="toolbar">
    <div class="pin">📍</div>
    <select id="areaS" class="sel"></select>
    <select id="timeS" class="sel"></select>
    <select id="spdS" class="sel"></select>
    <select id="torS" class="sel"></select>
    <button class="btn btn-or" id="goBtn">🔬 OR 最佳化求解</button>
  </div>
  <div class="summ" id="summ"></div>
  <div class="grid2">
    <div class="pnl">
      <div class="pnl-t ort"><span>🔬 最大補車排程（含銜接行車）</span><span class="m" id="meta"></span></div>
      <div class="pnl-b">
        <div class="lb">
          <b>目標</b>：在時間預算內 <span class="f">max 總補車數</span><br>
          <b>時間組成</b>：站內 = <span class="f">整備5分 + 裝卸(每輛1分)</span> ｜ 站間行車 = <span class="f">路網距離÷時速×60</span><br>
          <b>銜接行車</b>：<span class="f">上一趟終點站 → 下一趟起點站</span> 的行車時間計入總預算<br>
          <b>路網距離</b> = 直線×1.4×尖峰係數 ｜ 每趟 <span class="f">3~14輛</span> ｜ 同站可多趟
        </div>
        <div id="tasks"></div>
      </div>
    </div>
    <div class="pnl">
      <div class="pnl-t"><span>設定 / 排程結果</span></div>
      <div class="pnl-b">
        <div class="sg">
          <div class="fd"><label>單趟最大運量</label><input id="capI" type="number" min="3" max="14" value="14"></div>
          <div class="fd"><label>時間預算(分鐘)</label><input id="budgetI" type="number" min="10" max="180" value="60"></div>
        </div>
        <h4 style="margin:4px 0 6px;color:#5a4500;font-size:11px;">▎最佳排程順序</h4>
        <ul class="al2" id="agg"></ul>
      </div>
    </div>
  </div>
  <div class="cn">— max補車數 ｜ 含趟次間銜接行車 ｜ 每站整備5分+裝卸+路網行車 ≤ 預算 —</div>
</div>

/* === geo === */
function hav(a,b){if(!a||!b||a.lat==null||b.lat==null)return 0;const R=6371,r=Math.PI/180,dL=(b.lat-a.lat)*r,dN=(b.lng-a.lng)*r,x=Math.sin(dL/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function rKm(a,b){return hav(a,b)*ROAD_K}
function drv(a,b,s,t){return(rKm(a,b)*t/s)*60}

/* === stock === */
function stockAt(r,t){let s=0;for(let h=6;h<=t;h++)s+=Number(r.deltas[String(h)]||0);return s}

/* === trip time (每站整備5分) === */
function tTime(stops,spd,tor){
  let su=0,wk=0,tv=0;const sd=[],sg=[];
  for(let i=0;i<stops.length;i++){
    su+=SETUP;wk+=stops[i].qty;
    sd.push({station:stops[i].station,qty:stops[i].qty,action:stops[i].action,
             setup:SETUP,work:stops[i].qty,stTime:SETUP+stops[i].qty});
    if(i<stops.length-1){
      const d=rKm(stops[i].rec,stops[i+1].rec);
      const t2=drv(stops[i].rec,stops[i+1].rec,spd,tor);
      tv+=t2;sg.push({dist:d,time:t2});
    }
  }
  return{su,tv,wk,total:su+tv+wk,sd,sg};
}

/* === 銜接行車時間: 上趟終點 → 本趟起點 === */
function linkTime(prevEndRec, curStartRec, spd, tor){
  if(!prevEndRec || !curStartRec) return 0;
  if(prevEndRec.station === curStartRec.station) return 0; // 同站不用移動
  return drv(prevEndRec, curStartRec, spd, tor);
}

/* ================================================================
   OR ENGINE: max 補車數，含銜接行車時間
   
   每輪選下一趟時的「實際成本」=
     銜接行車(上趟終點→本趟起點) + 本趟站內+站間時間
   
   策略: 在剩餘時間內,挑「實際成本可塞下」且「車輛數最多」的趟
   ================================================================ */
function solve(area, t, maxQ, spd, tor, BUDGET){
  const recs = DATA.filter(r=>r.area===area);
  const recMap = {};
  const initSup = {}, initDem = {};

  for(const r of recs){
    recMap[r.station] = r;
    const stk = stockAt(r, t);
    if(stk > 0) initSup[r.station] = stk;
    if(stk < 0) initDem[r.station] = Math.abs(stk);
  }

  /* 產生指定缺車站的可行趟次
     minQ: 最低裝載門檻 (動態,剩餘時間吃緊時放寬到 1) */
  function genIn(tgtSt, sup, dem, timeLeft, minQ){
    const mq = minQ || MIN_Q;
    const need = dem[tgtSt]||0;
    if(need < mq) return [];
    const tgtR = recMap[tgtSt];
    const srcs = Object.entries(sup).filter(([st,v])=>v>0&&st!==tgtSt)
      .map(([st,v])=>({st,rec:recMap[st],av:v,d:rKm(recMap[st],tgtR)}))
      .sort((a,b)=>a.d-b.d).slice(0,15);
    if(!srcs.length) return [];
    const res=[];
    for(let n=1;n<=Math.min(3,srcs.length);n++){
      const combos=n===1?srcs.map(s=>[s]):n===2?c2(srcs.slice(0,10)):c3(srcs.slice(0,7));
      for(const combo of combos){
        let cap=0;
        for(const s of combo) cap+=s.av;
        const ld=Math.min(maxQ,cap,need);
        if(ld<mq)continue;
        let rm=ld;const picks=[];
        for(const s of combo){const tk=Math.min(s.av,rm);if(tk>0){picks.push({station:s.st,rec:s.rec,qty:tk,action:'pickup'});rm-=tk}if(rm<=0)break}
        const act=ld-rm;if(act<mq)continue;
        const stops=[...picks,{station:tgtSt,rec:tgtR,qty:act,action:'drop'}];
        const tt=tTime(stops,spd,tor);
        if(tt.total>timeLeft)continue;
        res.push({type:'in',target:tgtSt,stops,load:act,time:tt.total,tt,
                  startRec:picks[0].rec,endRec:tgtR});
      }
    }
    return res;
  }

  /* 產生滿柱站調出趟次 */
  function genOut(srcSt, sup, dem, timeLeft, minQ){
    const mq = minQ || MIN_Q;
    const av=sup[srcSt]||0;if(av<mq)return[];
    const srcR=recMap[srcSt];
    const dsts=Object.entries(dem).filter(([st,v])=>v>=1&&st!==srcSt)
      .map(([st,v])=>({st,rec:recMap[st],need:v,d:rKm(srcR,recMap[st])}))
      .sort((a,b)=>a.d-b.d).slice(0,15);
    if(!dsts.length)return[];
    const res=[];
    for(let n=1;n<=Math.min(3,dsts.length);n++){
      const combos=n===1?dsts.map(s=>[s]):n===2?c2(dsts.slice(0,10)):c3(dsts.slice(0,7));
      for(const combo of combos){
        let cap=0;for(const d of combo)cap+=d.need;
        const ld=Math.min(maxQ,av,cap);if(ld<mq)continue;
        let rm=ld;const drops=[];
        for(const d of combo){const gv=Math.min(d.need,rm);if(gv>0){drops.push({station:d.st,rec:d.rec,qty:gv,action:'drop'});rm-=gv}if(rm<=0)break}
        const act=ld-rm;if(act<mq)continue;
        const stops=[{station:srcSt,rec:srcR,qty:act,action:'pickup'},...drops];
        const tt=tTime(stops,spd,tor);
        if(tt.total>timeLeft)continue;
        const lastDrop=drops[drops.length-1];
        res.push({type:'out',target:srcSt,stops,load:act,time:tt.total,tt,
                  startRec:srcR,endRec:lastDrop.rec});
      }
    }
    return res;
  }

  function c2(a){const r=[];for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++)r.push([a[i],a[j]]);return r}
  function c3(a){const r=[];for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++)for(let k=j+1;k<a.length;k++)r.push([a[i],a[j],a[k]]);return r}

  /* =================================================================
     BEAM SEARCH: 多路徑探索,避開貪婪陷阱
     
     每層展開每個狀態的 top-N 候選趟次,全域保留 top-K 狀態
     這樣可以嘗試「少載但快」的組合,例如 2 趟×10 輛 vs 1 趟×14 輛
     ================================================================= */
  const BEAM_WIDTH = 8;   // 保留前 K 個路徑
  const BRANCH_N   = 6;   // 每個狀態展開 N 個候選趟次
  const MAX_DEPTH  = 20;  // 安全上限

  // 展開一個狀態的所有可行下一趟 (回傳 top-N)
  function expandState(state){
    const {sup, dem, timeUsed, curEndRec} = state;
    const timeLeft = BUDGET - timeUsed;
    if(timeLeft < SETUP*2 + 2) return [];
    const dynMinQ = (timeLeft >= SETUP*2 + MIN_Q*2) ? MIN_Q : 1;

    let allTrips=[];
    for(const [st,need] of Object.entries(dem)){
      if(need<dynMinQ)continue;
      allTrips.push(...genIn(st,sup,dem,timeLeft,dynMinQ));
    }
    for(const [st,av] of Object.entries(sup)){
      const stk=stockAt(recMap[st],t);
      if(stk>recMap[st].capacity&&av>=dynMinQ)
        allTrips.push(...genOut(st,sup,dem,timeLeft,dynMinQ));
    }
    if(!allTrips.length) return [];

    // 加銜接成本
    for(const trip of allTrips){
      const lk = curEndRec ? drv(curEndRec, trip.startRec, spd, tor) : 0;
      trip.linkTime = lk;
      trip.totalCost = lk + trip.time;
    }

    // 可行且時間塞得下
    let feasible = allTrips.filter(x => x.totalCost <= timeLeft);
    if(!feasible.length) return [];

    // 多元性: 先按「載量/成本」比(效率)排,取 top-N
    // 這樣不會全部都是「載最多」的相似候選
    feasible.sort((a,b) => (b.load/b.totalCost) - (a.load/a.totalCost));

    // 為了讓「載最多」也有機會進 beam,強制加入 top-2 按 load 排序
    const byLoad = [...feasible].sort((a,b)=>b.load-a.load||a.totalCost-b.totalCost);
    const picks = [];
    const seen = new Set();
    const sig = tr => tr.type + '|' + tr.stops.map(s=>s.station+':'+s.qty).join(',');
    for(const tr of [byLoad[0], byLoad[1], ...feasible]){
      if(!tr) continue;
      const k = sig(tr);
      if(seen.has(k)) continue;
      seen.add(k); picks.push(tr);
      if(picks.length >= BRANCH_N) break;
    }
    return picks;
  }

  // 套用一個趟次到狀態,回傳新狀態 (淺層 clone,足夠用)
  function applyTrip(state, trip){
    const newSup = {...state.sup};
    const newDem = {...state.dem};
    for(const s of trip.stops){
      if(s.action==='pickup') newSup[s.station] = (newSup[s.station]||0) - s.qty;
      else                    newDem[s.station] = (newDem[s.station]||0) - s.qty;
    }
    return {
      sup: newSup,
      dem: newDem,
      schedule: [...state.schedule, {
        trip,
        linkTime: trip.linkTime,
        linkFrom: state.curEndRec ? state.curEndRec.station : '(起點)',
        linkTo: trip.startRec.station
      }],
      timeUsed: state.timeUsed + trip.totalCost,
      curEndRec: trip.endRec,
      totalVeh: state.totalVeh + trip.load
    };
  }

  // 狀態去重用的簽章 (相同 schedule 結構視為重複,不論順序由路徑保證)
  function stateSig(s){
    return s.schedule.map(x => x.trip.type+':'+x.trip.target+':'+x.trip.load).join('>')
           + '|' + Math.round(s.timeUsed);
  }

  // 初始狀態
  const init = {
    sup: {...initSup}, dem: {...initDem},
    schedule: [], timeUsed: 0, curEndRec: null, totalVeh: 0
  };

  let beam = [init];
  let bestState = init;

  for(let depth=0; depth<MAX_DEPTH; depth++){
    const nextBeam = [];
    const seen = new Set();
    let anyExpanded = false;

    for(const state of beam){
      const candidates = expandState(state);
      if(!candidates.length){
        // 此路徑走到底,仍是候選終點
        continue;
      }
      anyExpanded = true;
      for(const trip of candidates){
        const ns = applyTrip(state, trip);
        const k = stateSig(ns);
        if(seen.has(k)) continue;
        seen.add(k);
        nextBeam.push(ns);
        if(ns.totalVeh > bestState.totalVeh ||
           (ns.totalVeh === bestState.totalVeh && ns.timeUsed < bestState.timeUsed)){
          bestState = ns;
        }
      }
    }

    if(!anyExpanded) break;
    if(!nextBeam.length) break;

    // 保留 top-K: 主指標總補車數,次指標剩餘時間多(=timeUsed小)
    nextBeam.sort((a,b) =>
      b.totalVeh - a.totalVeh ||
      a.timeUsed - b.timeUsed
    );
    beam = nextBeam.slice(0, BEAM_WIDTH);
  }

  const schedule = bestState.schedule;
  const timeUsed = bestState.timeUsed;
  const totalVeh = bestState.totalVeh;
  const totalLink = schedule.reduce((s,x)=>s+x.linkTime,0);
  return {schedule, totalVeh, totalTime: timeUsed, totalLink};
}

/* === render === */
function fm(m){return m.toFixed(1)}
function fD(km){return(km*1000).toFixed(0)+'m'}

function rFlow(stops,tt){
  const sd=tt.sd,sg=tt.sg;
  let h='<div class="sf"><div class="sr">';
  for(let i=0;i<sd.length;i++){
    const s=sd[i],act=s.action==='pickup'?'調出':'調入';
    h+=`<div class="sn"><div class="sl" title="${s.station}">${s.station}</div><div class="sd">整備<b>${s.setup}</b>分<span class="sp"></span>${act}<b>${s.qty}</b>輛=<b>${s.work}</b>分<span class="sp"></span>站內<b>${s.stTime}</b>分</div></div>`;
    if(i<sg.length){const g=sg[i];h+=`<div class="sa"><div class="aline"></div><div class="ai">${fD(g.dist)}<br>${fm(g.time)}分</div></div>`}
  }
  return h+'</div></div>';
}

function rSolution(sol,BDG,spd,tor){
  if(!sol.schedule.length)return'<div class="ec">無可行調度任務。</div>';

  let h=`<div class="orb">
    <div class="oi">🏆</div>
    <div class="os"><div class="ov">${sol.totalVeh}</div><div class="ol">總補車數</div></div>
    <div class="os"><div class="ov">${sol.schedule.length}</div><div class="ol">趟次</div></div>
    <div class="os"><div class="ov">${fm(sol.totalTime)}</div><div class="ol">總耗時(分)</div></div>
    <div class="os"><div class="ov">${fm(sol.totalLink)}</div><div class="ol">銜接行車(分)</div></div>
    <div class="ovs">${BDG}分鐘內最大補車，含趟次間銜接行車｜Beam Search</div>
  </div>`;

  let cumTime=0;
  h+=sol.schedule.map((item,i)=>{
    const c=item.trip;
    const lk=item.linkTime;
    const label=c.type==='in'?'補車':'清車';
    const cls=c.type==='in'?'in':'out';

    // 銜接行車卡片
    let linkHtml='';
    if(lk>0.05){
      const lkDist=rKm(
        DATA.find(r=>r.station===item.linkFrom)||{lat:0,lng:0},
        DATA.find(r=>r.station===item.linkTo)||{lat:0,lng:0}
      );
      linkHtml=`<div class="link-bar">
        <span class="link-icon">🚛</span>
        <span>銜接行車：${item.linkFrom} → ${item.linkTo}</span>
        <span>${fD(lkDist)} / <b>${fm(lk)}分</b></span>
      </div>`;
    }

    cumTime+=lk+c.time;
    const pct=cumTime/BDG*100;
    const pgc=pct<60?'pg':pct<85?'py':'pr2';

    return`${linkHtml}<div class="tc">
      <div class="th">
        <span><span class="sq">${i+1}</span><span class="ttype ${cls}">${label}</span></span>
        <span class="pr">→ ${c.target} ｜ ${c.load}輛 ｜ 累計${fm(cumTime)}/${BDG}分</span>
      </div>
      <div class="ttl">#${i+1} ${c.target} ${label} ${c.load} 輛</div>
      <div class="tb">
        <div class="tbh"><span>第${i+1}趟</span><span class="tbt">趟內${fm(c.time)}分${lk>0.05?' + 銜接'+fm(lk)+'分':''} → ${c.load}輛</span></div>
        ${rFlow(c.stops,c.tt)}
        <div class="tg">
          <div class="cx cs"><span class="cl">整備${c.stops.length}站×5</span><span class="cv">${c.tt.su}分</span></div>
          <div class="cx ct"><span class="cl">行車</span><span class="cv">${fm(c.tt.tv)}分</span></div>
          <div class="cx cw"><span class="cl">裝卸</span><span class="cv">${c.tt.wk}分</span></div>
          <div class="cx ctot"><span class="cl">趟內總時</span><span class="cv">${fm(c.time)}分</span></div>
        </div>
      </div>
      <div class="ts">
        <span>本趟<b>${c.load}</b>輛</span>
        ${lk>0.05?`<span>銜接<b>${fm(lk)}</b>分</span>`:''}
        <span>趟內<b>${fm(c.time)}</b>分</span>
        <span>累計<b>${fm(cumTime)}</b>/<b>${BDG}</b>分</span>
      </div>
      <div class="pgw"><div class="pgb ${pgc}" style="width:${Math.min(100,pct)}%"></div><div class="pgl">${pct.toFixed(0)}%</div></div>
    </div>`;
  }).join('');

  return h;
}

function rAgg(sol){
  if(!sol.schedule.length){E.agg.innerHTML='<div class="ec">無任務。</div>';return}
  let cum=0;
  E.agg.innerHTML=sol.schedule.map((item,i)=>{
    const c=item.trip;cum+=item.linkTime+c.time;
    const cl=c.type==='in'?'#ef3d2f':'#ff9800',tg=c.type==='in'?'補':'出';
    const lkTxt=item.linkTime>0.05?`+銜${fm(item.linkTime)}`:'';
    return`<li class="ai2"><div class="ark" style="background:${i<3?'#f4ca00':'#dcdcdc'}">${i+1}</div><div><div class="an"><span style="background:${cl};color:#fff;border-radius:6px;padding:0 4px;font-size:9px;margin-right:2px">${tg}</span>${c.target} ${c.load}輛</div><div class="am">${fm(c.time)}分${lkTxt} · 累計${fm(cum)}分</div></div><div class="at2">${fm(item.linkTime+c.time)}<span class="u">分</span></div><div class="ae2">${c.load}<span class="u">輛</span></div></li>`;
  }).join('');
}

/* 用到的銜接距離計算輔助 - rKm for records by station name */
function rKm2(stA,stB){
  const a=DATA.find(r=>r.station===stA),b=DATA.find(r=>r.station===stB);
  if(!a||!b)return 0;return rKm(a,b);
}

/* === main === */
function run(){
  const area=E.area.value,t=+E.time.value,spd=+E.spd.value,tor=+E.tor.value;
  const maxQ=Math.min(14,Math.max(3,+E.cap.value||14));E.cap.value=maxQ;
  const BDG=Math.max(10,+E.budget.value||60);E.budget.value=BDG;

  const recs=DATA.filter(r=>r.area===area);
  let shortC=0,fullC=0,totalN=0;
  recs.forEach(r=>{const s=stockAt(r,t);if(s<0){shortC++;totalN+=Math.abs(s)}if(s>r.capacity){fullC++;totalN+=(s-r.capacity)}});
  E.summ.innerHTML=`<span>責任區:<b>${area}</b>(${recs.length}站)</span><span>時段:<b>${t}:00</b></span><span>缺車:<b style="color:#ef3d2f">${shortC}</b></span><span>滿柱:<b style="color:#ff9800">${fullC}</b></span><span>需求:<b>${totalN}</b>輛</span><span><b>${spd}km/h×${tor}</b></span><span>預算:<b>${BDG}</b>分</span>`;

  const t0=performance.now();
  const sol=solve(area,t,maxQ,spd,tor,BDG);
  const ms=performance.now()-t0;

  E.tasks.innerHTML=rSolution(sol,BDG,spd,tor);
  E.meta.textContent=`${sol.schedule.length}趟 ${sol.totalVeh}輛/${fm(sol.totalTime)}分(銜接${fm(sol.totalLink)}分) · ${ms.toFixed(0)}ms`;
  rAgg(sol);
}

E.area.addEventListener('change',run);
E.time.addEventListener('change',run);
E.spd.addEventListener('change',run);
E.tor.addEventListener('change',run);
E.cap.addEventListener('input',run);
E.budget.addEventListener('input',run);
$('goBtn').addEventListener('click',run);
initUI();run();
</script>
</body>
